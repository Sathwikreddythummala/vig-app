{% extends "base.html" %}
{% block title %}Documents - Vigneshwara Enterprises{% endblock %}
{% block page_title %}Documents{% endblock %}
{% block content %}
<div class="glass-card mb-3 animate-in">
    <div class="d-flex flex-wrap gap-2 align-items-center">
        <select class="form-select glass-input" id="filterType" style="width:160px" onchange="applyFilter()">
            <option value="">All Types</option>
            <option value="Vehicle">Vehicle</option>
            <option value="Driver">Driver</option>
            <option value="GST">GST</option>
            <option value="GSTPurchase">GST Purchase</option>
            <option value="GSTSale">GST Sale / Bill</option>
            <option value="Expense">Expense</option>
            <option value="Fuel">Fuel</option>
            <option value="Income">Income</option>
            <option value="EMI">EMI</option>
        </select>
        <input type="text" class="form-control glass-input" id="filterSearch" placeholder="Search vehicle / driver / document type…" style="width:260px" oninput="applyFilter()">
        <span class="text-muted small ms-auto" id="docCount"></span>
    </div>
</div>

<div class="glass-card animate-in">
    <div class="table-responsive">
        <table class="table table-hover glass-table mb-0">
            <thead><tr><th>Type</th><th>Document</th><th>Entity</th><th>File Name</th><th>Uploaded</th><th>Actions</th></tr></thead>
            <tbody id="docsGrid"><tr><td colspan="6" class="text-center"><div class="spinner-border spinner-border-sm text-warning"></div></td></tr></tbody>
        </table>
    </div>
</div>

<script>
var allDocs = [];
var entityCache = {};

async function load() {
    var res = await fetch('/documents/api/list');
    allDocs = await res.json();
    // Fetch entity names
    var [vRes, dRes, gRes] = await Promise.all([
        fetch('/vehicles/api/list?per_page=1000'),
        fetch('/drivers/api/list?per_page=1000'),
        fetch('/gst/api/purchases'),
    ]);
    var vData = await vRes.json();
    var dData = await dRes.json();
    var gData = await gRes.json();
    (vData.vehicles||[]).forEach(function(v){ entityCache['Vehicle_'+v.VehicleID] = v.VehicleNumber; });
    (dData.drivers||[]).forEach(function(d){ entityCache['Driver_'+d.DriverID] = d.DriverName; });
    (gData.purchases||[]).forEach(function(p){
        entityCache['GSTPurchase_'+p.PurchaseID] = 'gstpurchase_' + String(p.InvoiceDate||'').slice(0,7) + '_' + (p.CreditTo||'NA') + '_' + (p.InvoiceNumber||'');
    });
    applyFilter();
}

function entityLabel(doc) {
    var key = doc.entity_type + '_' + doc.entity_id;
    return entityCache[key] || doc.entity_id;
}

function applyFilter() {
    var types = getFilterValues('filterType');
    var search = document.getElementById('filterSearch').value.toLowerCase();
    var filtered = allDocs.filter(function(d) {
        if (types.length && types.indexOf(d.entity_type) === -1) return false;
        if (search) {
            var label = entityLabel(d).toLowerCase();
            var doctype = (d.doc_type||'').toLowerCase();
            var fname = (d.file_name||'').toLowerCase();
            if (!label.includes(search) && !doctype.includes(search) && !fname.includes(search)) return false;
        }
        return true;
    });
    document.getElementById('docCount').textContent = filtered.length + ' document' + (filtered.length !== 1 ? 's' : '');
    render(filtered);
}

function entityBadgeClass(type) {
    if (type === 'Vehicle') return 'bg-warning text-dark';
    if (type === 'Driver') return 'bg-success';
    if (type === 'GST') return 'bg-primary';
    return 'bg-secondary';
}

function docIcon(fname) {
    if (!fname) return 'bi-file-earmark';
    var ext = fname.split('.').pop().toLowerCase();
    if (ext === 'pdf') return 'bi-file-earmark-pdf text-danger';
    if (['jpg','jpeg','png','gif','webp'].includes(ext)) return 'bi-file-earmark-image text-success';
    if (['xlsx','xls'].includes(ext)) return 'bi-file-earmark-excel text-success';
    if (['doc','docx'].includes(ext)) return 'bi-file-earmark-word text-primary';
    return 'bi-file-earmark text-warning';
}

function render(docs) {
    var tbody = document.getElementById('docsGrid');
    if (!docs.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4"><i class="bi bi-folder2 me-2"></i>No documents found</td></tr>';
        return;
    }
    tbody.innerHTML = docs.map(function(d) {
        var label = entityLabel(d);
        var icon = docIcon(d.file_name);
        var uploaded = (d.uploaded_date||'').slice(0,10);
        return '<tr>' +
            '<td><span class="badge ' + entityBadgeClass(d.entity_type) + '">' + d.entity_type + '</span></td>' +
            '<td><i class="bi ' + icon + ' me-1"></i><strong>' + (d.doc_type||'Document') + '</strong></td>' +
            '<td>' + label + '</td>' +
            '<td class="text-muted small">' + (d.file_name||'') + '</td>' +
            '<td class="text-muted small">' + uploaded + '</td>' +
            '<td><div class="d-flex gap-1">' +
                '<a href="/documents/api/view/' + d.doc_id + '" target="_blank" class="btn btn-sm btn-outline-secondary"><i class="bi bi-eye"></i> View</a>' +
                '<a href="/documents/api/download/' + d.doc_id + '" class="btn btn-sm btn-warning"><i class="bi bi-download"></i> Download</a>' +
            '</div></td>' +
        '</tr>';
    }).join('');
}

load();
</script>
{% endblock %}
