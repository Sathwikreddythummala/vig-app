{% extends "base.html" %}
{% block title %}Driver Details - Vigneshwara Enterprises{% endblock %}
{% block page_title %}Driver Details{% endblock %}
{% block content %}
<div id="driverDetailsContent">
    <div class="text-center py-5"><div class="spinner-border text-warning"></div><p class="mt-2">Loading driver details...</p></div>
</div>
<div class="modal fade" id="uploadDrvDocModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content glass-modal">
            <div class="modal-header border-0"><h5 class="modal-title">Upload Document</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="uploadDrvDocForm" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Document Type</label>
                        <select class="form-select glass-input" id="uploadDrvDocType">
                            <option>License</option><option>Aadhaar</option><option>Passbook</option><option>Photos</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">File</label>
                        <input type="file" class="form-control glass-input" id="uploadDrvDocFile" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-warning" onclick="uploadDrvDoc()"><i class="bi bi-upload"></i> Upload</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let driverId = '{{ driver_id }}';
let allDriverData = null;
let selectedMonth = '';
let allDriversList = [];

document.addEventListener('DOMContentLoaded', async () => {
    loadAlerts();
    const res = await fetch('/drivers/api/list');
    const data = await res.json();
    allDriversList = (data.drivers || []).filter(d => String(d.Status||'Active').toLowerCase() !== 'inactive');
    loadDriverDetails();
});

async function loadDriverDetails() {
    const monthParam = selectedMonth ? `?month=${selectedMonth}` : '';
    const [detRes, incRes] = await Promise.all([
        fetch(`/drivers/api/${driverId}`),
        fetch(`/drivers/api/salaries${monthParam}`)
    ]);
    const data = await detRes.json();
    if (data.error) { document.getElementById('driverDetailsContent').innerHTML = '<div class="alert alert-danger">Driver not found</div>'; return; }
    const salData = await incRes.json();
    const salRow = (salData.salaries || []).find(r => r.DriverID === driverId);
    data.incentive = salRow ? salRow.Incentive : 0;
    allDriverData = data;
    renderDriverDetails();
}

async function editIncentive() {
    const current = allDriverData.incentive || 0;
    const val = prompt('Enter incentive amount for ' + selectedMonth + ':', current);
    if (val === null) return;
    const amount = parseFloat(val) || 0;
    const res = await fetch('/drivers/api/incentive', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ DriverID: driverId, ForMonth: selectedMonth, Amount: amount })
    });
    const data = await res.json();
    if (data.success) { showToast('Incentive updated', 'success'); loadDriverDetails(); }
    else showToast(data.error || 'Failed', 'danger');
}

function switchDriver(id) {
    driverId = id;
    selectedMonth = '';
    history.replaceState(null, '', `/drivers/details/${id}`);
    loadDriverDetails();
}

function getMonthOptions(expenses) {
    const months = new Set();
    expenses.forEach(e => {
        const fm = e.ForMonth || '';
        if (fm) months.add(fm);
        const dt = (e.ExpenseDate || '').substring(0, 7);
        if (dt) months.add(dt);
    });
    return Array.from(months).sort().reverse();
}

function filterByMonth(expenses, month) {
    if (!month) return expenses;
    return expenses.filter(e => {
        const fm = e.ForMonth || '';
        const dt = (e.ExpenseDate || '').substring(0, 7);
        // ForMonth takes priority; fall back to ExpenseDate only if ForMonth is blank
        return (fm ? fm : dt) === month;
    });
}

function onMonthChange() {
    selectedMonth = document.getElementById('drvMonthFilter').value;
    renderDriverDetails();
}

function renderDriverDetails() {
    const d = allDriverData.driver;
    const docs = allDriverData.documents || [];
    const allExpenses = allDriverData.expenses || [];
    const expenses = filterByMonth(allExpenses, selectedMonth);
    const monthOptions = getMonthOptions(allExpenses);

    const advances = expenses.filter(e => e.SubCategory === 'Advance');
    const meals = expenses.filter(e => e.SubCategory === 'Meals');
    const salaries = expenses.filter(e => e.SubCategory === 'Salary');
    const deductions = expenses.filter(e => e.SubCategory === 'Deductions');
    const otherExp = expenses.filter(e => !['Advance','Meals','Salary','Deductions'].includes(e.SubCategory));
    const totalAdvance = advances.reduce((s,e) => s + parseFloat(e.Amount||0), 0);
    const totalMeals = meals.reduce((s,e) => s + parseFloat(e.Amount||0), 0);
    const totalSalaryPaid = salaries.reduce((s,e) => s + parseFloat(e.Amount||0), 0);
    const totalDeductions = deductions.reduce((s,e) => s + parseFloat(e.Amount||0), 0);
    const totalOther = otherExp.reduce((s,e) => s + parseFloat(e.Amount||0), 0);
    const totalExp = expenses.reduce((s,e) => s + parseFloat(e.Amount||0), 0);
    const profileSalary = parseFloat(d.Salary || 0);
    const effectiveSalary = selectedMonth ? profileSalary : 0;
    // Incentive from allDriverData (fetched separately per month)
    const totalIncentive = parseFloat(allDriverData.incentive || 0);
    const netPayable = effectiveSalary + totalIncentive - totalAdvance - totalMeals - totalDeductions - totalOther;

    const monthLabel = selectedMonth ? selectedMonth : 'All Time';

    document.getElementById('driverDetailsContent').innerHTML = `
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
        <div class="d-flex gap-2 align-items-center flex-wrap">
            <select class="form-select glass-input" style="width:200px" onchange="switchDriver(this.value)">
                ${allDriversList.map(dr => `<option value="${dr.DriverID}" ${dr.DriverID===driverId?'selected':''}>${dr.DriverName}</option>`).join('')}
            </select>
            <div><small class="text-muted">${d.EmployeeType||'Driver'} | ${d.Status||'Active'} | ${d.AssignedVehicle||'No vehicle'}</small></div>
        </div>
        <div class="d-flex gap-2 align-items-center flex-wrap">
            <select class="form-select glass-input" id="drvMonthFilter" style="width:160px" onchange="onMonthChange()">
                <option value="">All Months</option>
                ${monthOptions.map(m => `<option value="${m}" ${m===selectedMonth?'selected':''}>${m}</option>`).join('')}
            </select>
            <button class="btn btn-warning btn-sm" onclick="bootstrap.Modal.getOrCreateInstance(document.getElementById('uploadDrvDocModal')).show()"><i class="bi bi-upload"></i> Upload Doc</button>
            <a href="/drivers" class="btn btn-outline-warning btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
        </div>
    </div>
    <div class="row g-3 mb-3">
        <div class="col-xl-2 col-md-4"><div class="glass-card stat-card animate-in"><div class="stat-icon bg-month"><i class="bi bi-cash"></i></div><div class="stat-info"><small>Salary (₹${profileSalary.toLocaleString('en-IN')}/mo)</small><h4>₹${effectiveSalary.toLocaleString('en-IN')}</h4></div></div></div>
        <div class="col-xl-2 col-md-4"><div class="glass-card stat-card animate-in" style="animation-delay:0.05s"><div class="stat-icon bg-driver"><i class="bi bi-star"></i></div><div class="stat-info"><small>Incentive ${selectedMonth?`<button class="btn btn-link btn-sm p-0 ms-1" style="font-size:11px;vertical-align:middle" onclick="editIncentive()" title="Edit"><i class="bi bi-pencil"></i></button>`:''}</small><h4 class="text-success" id="incentiveDisplay">₹${totalIncentive.toLocaleString('en-IN')}</h4></div></div></div>
        <div class="col-xl-2 col-md-4"><div class="glass-card stat-card animate-in" style="animation-delay:0.1s"><div class="stat-icon bg-vehicle"><i class="bi bi-arrow-up-circle"></i></div><div class="stat-info"><small>Advance</small><h4 class="text-danger">₹${totalAdvance.toLocaleString('en-IN')}</h4></div></div></div>
        <div class="col-xl-2 col-md-4"><div class="glass-card stat-card animate-in" style="animation-delay:0.15s"><div class="stat-icon bg-driver"><i class="bi bi-cup-hot"></i></div><div class="stat-info"><small>Meals</small><h4 class="text-danger">₹${totalMeals.toLocaleString('en-IN')}</h4></div></div></div>
        <div class="col-xl-2 col-md-4"><div class="glass-card stat-card animate-in" style="animation-delay:0.2s"><div class="stat-icon bg-expense"><i class="bi bi-dash-circle"></i></div><div class="stat-info"><small>Deductions</small><h4 class="text-danger">₹${totalDeductions.toLocaleString('en-IN')}</h4></div></div></div>
        <div class="col-xl-2 col-md-4"><div class="glass-card stat-card animate-in" style="animation-delay:0.25s"><div class="stat-icon bg-expense"><i class="bi bi-cash-stack"></i></div><div class="stat-info"><small>Total Expenses</small><h4>₹${totalExp.toLocaleString('en-IN')}</h4></div></div></div>
        ${selectedMonth?`
        <div class="col-xl-2 col-md-4"><div class="glass-card stat-card animate-in" style="animation-delay:0.3s"><div class="stat-icon" style="background:var(--accent-green,#28a745)"><i class="bi bi-wallet2"></i></div><div class="stat-info"><small>Net Payable</small><h4 class="text-success">₹${netPayable.toLocaleString('en-IN')}</h4></div></div></div>
        <div class="col-xl-2 col-md-4"><div class="glass-card stat-card animate-in" style="animation-delay:0.35s"><div class="stat-icon bg-month"><i class="bi bi-check-circle"></i></div><div class="stat-info"><small>Salary Paid</small><h4>₹${totalSalaryPaid.toLocaleString('en-IN')}</h4></div></div></div>
        <div class="col-xl-2 col-md-4"><div class="glass-card stat-card animate-in" style="animation-delay:0.4s"><div class="stat-icon" style="background:#dc3545"><i class="bi bi-hourglass-split"></i></div><div class="stat-info"><small>Remaining</small><h4 class="${(netPayable-totalSalaryPaid)>0?'text-danger':'text-success'}">₹${(netPayable-totalSalaryPaid).toLocaleString('en-IN')}</h4></div></div></div>
        `:''}
    </div>
    ${selectedMonth ? `
    <div class="glass-card mb-3 animate-in" style="animation-delay:0.35s">
        <h6><i class="bi bi-calculator"></i> Monthly Summary — ${monthLabel}</h6><hr>
        <div style="max-width:400px">
            <div class="d-flex justify-content-between py-1"><span>Salary (profile)</span><strong class="text-success">₹${profileSalary.toLocaleString('en-IN')}</strong></div>
            <div class="d-flex justify-content-between py-1"><span>+ Incentive</span><strong class="${totalIncentive>0?'text-success':'text-muted'}">${totalIncentive>0?'₹'+totalIncentive.toLocaleString('en-IN'):'-'}</strong></div>
            <div class="d-flex justify-content-between py-1"><span>− Advance</span><strong class="text-danger">₹${totalAdvance.toLocaleString('en-IN')}</strong></div>
            <div class="d-flex justify-content-between py-1"><span>− Meals</span><strong class="text-danger">₹${totalMeals.toLocaleString('en-IN')}</strong></div>
            ${totalDeductions>0?`<div class="d-flex justify-content-between py-1"><span>− Deductions</span><strong class="text-danger">₹${totalDeductions.toLocaleString('en-IN')}</strong></div>`:''}
            ${totalOther>0?`<div class="d-flex justify-content-between py-1"><span>− Other Expenses</span><strong class="text-danger">₹${totalOther.toLocaleString('en-IN')}</strong></div>`:''}
            <hr class="my-2">
            <div class="d-flex justify-content-between py-1"><strong>Net Payable</strong><strong class="fs-5 ${netPayable>=0?'text-success':'text-danger'}">₹${netPayable.toLocaleString('en-IN')}</strong></div>
            <div class="d-flex justify-content-between py-1"><span class="text-muted">Salary Paid</span><span class="text-muted">₹${totalSalaryPaid.toLocaleString('en-IN')}</span></div>
            <div class="d-flex justify-content-between py-1 border-top mt-1 pt-2"><strong>Remaining Payment</strong><strong class="fs-6 ${(netPayable-totalSalaryPaid)>0?'text-danger':'text-success'}">₹${(netPayable-totalSalaryPaid).toLocaleString('en-IN')}</strong></div>
        </div>
    </div>` : ''}
    <div class="row g-3 mb-3">
        <div class="col-lg-6"><div class="glass-card animate-in" style="animation-delay:0.4s">
            <h6><i class="bi bi-person"></i> Personal Information</h6><hr>
            <div class="row g-2 small">
                <div class="col-6"><strong>Mobile:</strong> ${d.MobileNumber||'-'}</div>
                <div class="col-6"><strong>Emergency:</strong> ${d.EmergencyContact||'-'}</div>
                <div class="col-12"><strong>Address:</strong> ${d.Address||'-'}</div>
                <div class="col-6"><strong>Aadhaar:</strong> ${d.AadhaarNumber||'-'}</div>
                <div class="col-6"><strong>Joining:</strong> ${d.JoiningDate||'-'}</div>
            </div>
        </div></div>
        <div class="col-lg-6"><div class="glass-card animate-in" style="animation-delay:0.5s">
            <h6><i class="bi bi-card-checklist"></i> License & Bank</h6><hr>
            <div class="row g-2 small">
                <div class="col-6"><strong>License No:</strong> ${d.DrivingLicenseNumber||'-'}</div>
                <div class="col-6"><strong>License Expiry:</strong> ${d.LicenseExpiryDate||'-'}</div>
                <div class="col-6"><strong>Bank:</strong> ${d.BankName||'-'}</div>
                <div class="col-6"><strong>Account:</strong> ${d.AccountNumber||'-'}</div>
                <div class="col-6"><strong>IFSC:</strong> ${d.IFSCCode||'-'}</div>
                <div class="col-6"><strong>Salary:</strong> ₹${Number(d.Salary||0).toLocaleString('en-IN')}/month</div>
            </div>
        </div></div>
    </div>
    <div class="row g-3 mb-3">
        <div class="col-lg-6"><div class="glass-card animate-in" style="animation-delay:0.6s">
            <h6><i class="bi bi-folder"></i> Documents</h6>
            ${docs.length?docs.map(dc=>`<div class="d-flex justify-content-between align-items-center border-bottom py-2">
                <div><i class="bi bi-file-earmark me-1"></i><strong>${dc.doc_type}</strong> <small class="text-muted ms-1">${dc.file_name}</small></div>
                <div class="d-flex gap-1">
                    <a href="/documents/api/view/${dc.doc_id}" target="_blank" class="btn btn-sm btn-outline-secondary" title="View"><i class="bi bi-eye"></i></a>
                    <a href="/documents/api/download/${dc.doc_id}" class="btn btn-sm btn-outline-warning" title="Download"><i class="bi bi-download"></i></a>
                </div>
            </div>`).join(''):'<p class="text-muted">No documents uploaded</p>'}
        </div></div>
        <div class="col-lg-6"><div class="glass-card animate-in" style="animation-delay:0.7s">
            <h6><i class="bi bi-arrow-up-circle"></i> Advance History</h6>
            <div class="table-responsive"><table class="table table-sm glass-table small">
                <thead><tr><th>Date</th><th>Month</th><th>Amount</th><th>Description</th></tr></thead>
                <tbody>${advances.length?advances.sort((a,b)=>b.ExpenseDate.localeCompare(a.ExpenseDate)).map(e=>`<tr><td>${e.ExpenseDate}</td><td>${e.ForMonth||'-'}</td><td class="fw-bold">₹${Number(e.Amount).toLocaleString('en-IN')}</td><td>${e.Description||'-'}</td></tr>`).join(''):'<tr><td colspan="4" class="text-center text-muted">No advances</td></tr>'}</tbody>
            </table></div>
        </div></div>
    </div>
    <div class="glass-card animate-in" style="animation-delay:0.8s">
        <h6><i class="bi bi-clock-history"></i> Expense History ${selectedMonth ? '— '+monthLabel : ''}</h6>
        <div class="table-responsive"><table class="table table-hover glass-table small">
            <thead><tr><th>Date</th><th>Category</th><th>SubCategory</th><th>Month</th><th>Description</th><th>Amount</th><th>Paid By</th><th>Vehicle</th></tr></thead>
            <tbody>${expenses.length?expenses.sort((a,b)=>b.ExpenseDate.localeCompare(a.ExpenseDate)).map(e=>`<tr>
                <td>${e.ExpenseDate}</td><td><span class="badge bg-warning text-dark">${e.Category}</span></td><td>${e.SubCategory||'-'}</td>
                <td>${e.ForMonth||'-'}</td><td>${e.Description||'-'}</td><td class="fw-bold">₹${Number(e.Amount).toLocaleString('en-IN')}</td>
                <td>${e.PaidBy||'-'}</td><td>${e.VehicleNumber||'-'}</td>
            </tr>`).join(''):'<tr><td colspan="8" class="text-center text-muted">No expenses</td></tr>'}</tbody>
        </table></div>
    </div>`;
}

async function uploadDrvDoc() {
    const form = new FormData();
    form.append('doc_type', document.getElementById('uploadDrvDocType').value);
    form.append('file', document.getElementById('uploadDrvDocFile').files[0]);
    if (!document.getElementById('uploadDrvDocFile').files[0]) { showToast('Select a file','danger'); return; }
    const res = await fetch(`/drivers/api/${driverId}/upload`, { method:'POST', body: form });
    const data = await res.json();
    if (data.success) {
        bootstrap.Modal.getInstance(document.getElementById('uploadDrvDocModal')).hide();
        showToast('Document uploaded','success');
        loadDriverDetails();
    } else {
        showToast(data.error||'Upload failed','danger');
    }
}
</script>
{% endblock %}
