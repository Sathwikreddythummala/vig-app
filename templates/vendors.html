{% extends "base.html" %}
{% block title %}Vendors - Vigneshwara Enterprises{% endblock %}
{% block page_title %}Vendor Management{% endblock %}
{% block content %}
<div class="glass-card mb-3 animate-in">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
        <input type="text" class="form-control glass-input" id="searchVendor" placeholder="Search vendors..." style="width:300px" oninput="filterVendors()">
        <button class="btn btn-warning viewer-hide" data-bs-toggle="modal" data-bs-target="#vendorModal" onclick="resetVendorForm()"><i class="bi bi-plus-lg"></i> Add Vendor</button>
    </div>
</div>
<div class="row g-3" id="vendorCards">
    <div class="col-12 text-center py-5"><div class="spinner-border text-warning"></div></div>
</div>
<div class="modal fade" id="vendorModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg">
        <div class="modal-content glass-modal">
            <div class="modal-header border-0"><h5 class="modal-title" id="vendorModalTitle">Add Vendor</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="vendorForm">
                    <input type="hidden" id="vndId">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label">Vendor/Company Name *</label><input type="text" class="form-control glass-input" id="vndName" required></div>
                        <div class="col-md-6"><label class="form-label">Contact Person</label><input type="text" class="form-control glass-input" id="vndContact"></div>
                        <div class="col-md-4"><label class="form-label">Mobile Number</label><input type="text" class="form-control glass-input" id="vndMobile"></div>
                        <div class="col-md-4"><label class="form-label">Email</label><input type="email" class="form-control glass-input" id="vndEmail"></div>
                        <div class="col-md-4"><label class="form-label">GST Number</label><input type="text" class="form-control glass-input" id="vndGST"></div>
                        <div class="col-md-8"><label class="form-label">Address</label><input type="text" class="form-control glass-input" id="vndAddress"></div>
                        <div class="col-md-4"><label class="form-label">Payment Terms</label>
                            <select class="form-select glass-input" id="vndPayTerms"><option>Immediate</option><option>7 Days</option><option>15 Days</option><option>30 Days</option><option>45 Days</option><option>60 Days</option></select>
                        </div>
                        <div class="col-md-4"><label class="form-label">Status</label>
                            <select class="form-select glass-input" id="vndStatus"><option>Active</option><option>Inactive</option></select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-warning" onclick="saveVendor()"><i class="bi bi-check-lg"></i> Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
var allVendors = [];
var vndModalEl = document.getElementById('vendorModal');

document.addEventListener('DOMContentLoaded', async function() {
    try {
        var res = await fetch('/vendors/api/list');
        var data = await res.json();
        allVendors = data.vendors || [];
        renderVendors(allVendors);
    } catch(err) { document.getElementById('vendorCards').innerHTML = '<div class="col-12 text-center text-muted py-5">Failed to load</div>'; }
    loadAlerts();
});

function renderVendors(list) {
    var c = document.getElementById('vendorCards');
    if (!list.length) { c.innerHTML = '<div class="col-12 text-center text-muted py-5">No vendors found. Click "Add Vendor" to add one.</div>'; return; }
    c.innerHTML = list.map(function(v, i) {
        return '<div class="col-xl-4 col-md-6 animate-in" style="animation-delay:'+i*0.05+'s"><div class="glass-card vehicle-card">' +
            '<div class="d-flex justify-content-between align-items-start mb-2"><div><h5 class="mb-0 fw-bold">'+v.VendorName+'</h5><small class="text-muted">'+(v.ContactPerson||'')+'</small></div>' +
            '<span class="badge '+(v.Status==='Active'?'bg-success':'bg-secondary')+'">'+v.Status+'</span></div>' +
            '<div class="small text-muted mb-1"><i class="bi bi-phone"></i> '+(v.MobileNumber||'-')+'</div>' +
            '<div class="small text-muted mb-1"><i class="bi bi-receipt"></i> GST: '+(v.GSTNumber||'-')+'</div>' +
            '<div class="small text-muted mb-2"><i class="bi bi-clock"></i> Payment: '+(v.PaymentTerms||'-')+'</div>' +
            '<div class="d-flex gap-1">' +
                '<button class="btn btn-sm btn-outline-warning flex-fill" onclick="editVendor(\''+v.VendorID+'\')"><i class="bi bi-pencil"></i> Edit</button>' +
                '<button class="btn btn-sm btn-outline-danger" onclick="deleteVendor(\''+v.VendorID+'\')"><i class="bi bi-trash"></i></button>' +
            '</div></div></div>';
    }).join('');
}

function filterVendors() {
    var s = document.getElementById('searchVendor').value.toLowerCase();
    renderVendors(allVendors.filter(function(v) { return v.VendorName.toLowerCase().indexOf(s)!==-1 || (v.ContactPerson||'').toLowerCase().indexOf(s)!==-1 || (v.MobileNumber||'').indexOf(s)!==-1; }));
}

function resetVendorForm() { document.getElementById('vendorForm').reset(); document.getElementById('vndId').value=''; document.getElementById('vendorModalTitle').textContent='Add Vendor'; }

function editVendor(vid) {
    var v = allVendors.find(function(x){return x.VendorID===vid});
    if (!v) return;
    document.getElementById('vndId').value=v.VendorID;
    document.getElementById('vendorModalTitle').textContent='Edit Vendor';
    document.getElementById('vndName').value=v.VendorName||'';
    document.getElementById('vndContact').value=v.ContactPerson||'';
    document.getElementById('vndMobile').value=v.MobileNumber||'';
    document.getElementById('vndEmail').value=v.Email||'';
    document.getElementById('vndGST').value=v.GSTNumber||'';
    document.getElementById('vndAddress').value=v.Address||'';
    document.getElementById('vndPayTerms').value=v.PaymentTerms||'Immediate';
    document.getElementById('vndStatus').value=v.Status||'Active';
    bootstrap.Modal.getOrCreateInstance(vndModalEl).show();
}

async function saveVendor() {
    var id = document.getElementById('vndId').value;
    var payload = { VendorName:document.getElementById('vndName').value.trim(), ContactPerson:document.getElementById('vndContact').value, MobileNumber:document.getElementById('vndMobile').value, Email:document.getElementById('vndEmail').value, GSTNumber:document.getElementById('vndGST').value, Address:document.getElementById('vndAddress').value, PaymentTerms:document.getElementById('vndPayTerms').value, Status:document.getElementById('vndStatus').value };
    if (!payload.VendorName) { showToast('Vendor name required','danger'); return; }
    try {
        var res = await fetch(id?'/vendors/api/'+id:'/vendors/api/add', { method:id?'PUT':'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        var data = await res.json();
        if (data.success) { var m=bootstrap.Modal.getInstance(vndModalEl); if(m)m.hide(); showToast(id?'Updated':'Added','success'); var r=await fetch('/vendors/api/list').then(function(r){return r.json()}); allVendors=r.vendors||[]; renderVendors(allVendors); }
        else { showToast(data.error||'Failed','danger'); }
    } catch(err) { showToast('Network error','danger'); }
}

async function deleteVendor(id) {
    if (!confirm('Delete this vendor?')) return;
    try { var res=await fetch('/vendors/api/'+id,{method:'DELETE'}); var data=await res.json(); if(data.success){showToast('Deleted','success');allVendors=allVendors.filter(function(v){return v.VendorID!==id});renderVendors(allVendors);}else{showToast(data.error||'Failed','danger');} }
    catch(err) { showToast('Network error','danger'); }
}
</script>
{% endblock %}
