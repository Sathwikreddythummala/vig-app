<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TSR Enterprises</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
        body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FFF9C4 0%,#FFFDE7 30%,#FFD54F 70%,#FFC107 100%);overflow:hidden;position:relative}
        body::before{content:'';position:absolute;width:400px;height:400px;background:rgba(255,213,79,0.3);border-radius:50%;top:-100px;right:-100px;animation:float 6s ease-in-out infinite}
        body::after{content:'';position:absolute;width:300px;height:300px;background:rgba(255,249,196,0.4);border-radius:50%;bottom:-50px;left:-50px;animation:float 8s ease-in-out infinite reverse}
        @keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(5deg)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .login-card{background:rgba(255,255,255,0.25);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.4);border-radius:24px;padding:50px 40px;text-align:center;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(255,193,7,0.2);animation:slideUp 0.8s ease-out}
        .login-icon{width:80px;height:80px;background:linear-gradient(135deg,#FFD54F,#FFC107);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px;color:#5D4037;box-shadow:0 4px 15px rgba(255,193,7,0.4)}
        h1{font-size:1.8rem;font-weight:700;color:#3E2723;margin-bottom:5px}
        .subtitle{color:#5D4037;font-size:0.9rem;margin-bottom:30px}
        .login-btn{display:inline-flex;align-items:center;gap:12px;padding:14px 36px;background:linear-gradient(135deg,#FFD54F,#FFC107);border:none;border-radius:50px;font-size:1rem;font-weight:600;color:#3E2723;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 15px rgba(255,193,7,0.3);text-decoration:none}
        .login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,193,7,0.5);color:#3E2723;animation:pulse 0.6s ease-in-out}
        .login-btn i{font-size:1.3rem}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-icon"><i class="bi bi-truck"></i></div>
        <h1>TSR Enterprises</h1>
        <p class="subtitle">Fleet Management System</p>
        <a href="/auth/login" class="login-btn"><i class="bi bi-google"></i> Sign in with Google</a>
    </div>
</body>
</html>
