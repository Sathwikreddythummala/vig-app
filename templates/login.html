<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vigneshwara Enterprises</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
        body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FFF9C4 0%,#FFFDE7 30%,#FFD54F 70%,#FFC107 100%);overflow:hidden;position:relative}
        body::before{content:'';position:absolute;width:400px;height:400px;background:rgba(255,213,79,0.3);border-radius:50%;top:-100px;right:-100px;animation:float 6s ease-in-out infinite;pointer-events:none;z-index:0}
        body::after{content:'';position:absolute;width:300px;height:300px;background:rgba(255,249,196,0.4);border-radius:50%;bottom:-50px;left:-50px;animation:float 8s ease-in-out infinite reverse;pointer-events:none;z-index:0}
        @keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(5deg)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
        .login-card{background:rgba(255,255,255,0.25);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.4);border-radius:24px;padding:40px 36px;text-align:center;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(255,193,7,0.2);animation:slideUp 0.8s ease-out;position:relative;z-index:1}
        .login-icon{width:80px;height:80px;background:linear-gradient(135deg,#FFD54F,#FFC107);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:36px;color:#5D4037;box-shadow:0 4px 15px rgba(255,193,7,0.4)}
        h1{font-size:1.8rem;font-weight:700;color:#3E2723;margin-bottom:4px}
        .subtitle{color:#5D4037;font-size:0.9rem;margin-bottom:28px}
        .login-btn{display:flex;align-items:center;gap:12px;padding:13px 36px;background:linear-gradient(135deg,#FFD54F,#FFC107);border:none;border-radius:50px;font-size:1rem;font-weight:600;color:#3E2723;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 15px rgba(255,193,7,0.3);text-decoration:none;width:100%;justify-content:center;position:relative;z-index:2}
        .login-btn *{pointer-events:none}
        .login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,193,7,0.5);color:#3E2723}
        .otp-btn{display:flex;align-items:center;gap:12px;padding:13px 36px;background:rgba(255,255,255,0.4);border:1.5px solid rgba(255,193,7,0.5);border-radius:50px;font-size:1rem;font-weight:600;color:#3E2723;cursor:pointer;transition:all 0.3s;width:100%;justify-content:center;pointer-events:auto;position:relative;z-index:2}
        .otp-btn *{pointer-events:none}
        .otp-btn:hover{background:rgba(255,255,255,0.6)}
        .otp-btn.ready{background:linear-gradient(135deg,#FFD54F,#FFC107);box-shadow:0 4px 15px rgba(255,193,7,0.5)}
        .otp-input{background:rgba(255,255,255,0.5);border:1.5px solid rgba(255,193,7,0.4);border-radius:12px;padding:12px 16px;font-size:1rem;width:100%;outline:none;color:#3E2723;font-family:'Poppins',sans-serif;transition:border 0.2s}
        .otp-input:focus{border-color:#FFC107;background:rgba(255,255,255,0.7)}
        .otp-input::placeholder{color:#a0856b}
        .prefix-box{background:rgba(255,193,7,0.2);border:1.5px solid rgba(255,193,7,0.4);border-right:none;border-radius:12px 0 0 12px;padding:12px 14px;font-weight:600;color:#5D4037;font-size:0.95rem;flex-shrink:0}
        .otp-input.with-prefix{border-radius:0 12px 12px 0}
        .err-msg{color:#c0392b;font-size:0.82rem;margin-top:6px;display:none;text-align:left}
        .divider{display:flex;align-items:center;gap:10px;margin:20px 0;color:#8D6E63;font-size:0.85rem;font-weight:500}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(93,64,55,0.25)}
        .otp-section{text-align:left}
        .otp-section label{font-size:0.85rem;font-weight:600;color:#5D4037;margin-bottom:6px;display:block}
        .input-row{display:flex;margin-bottom:8px;position:relative;z-index:2}
        .grecaptcha-badge{visibility:hidden !important}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-icon"><i class="bi bi-truck"></i></div>
        <h1>Vigneshwara Enterprises</h1>
        <p class="subtitle">Fleet Management System</p>

        <a href="/auth/login" class="login-btn"><i class="bi bi-google"></i> Sign in with Google</a>

        <div class="divider">or</div>

        <div class="otp-section">
            <label><i class="bi bi-phone me-1"></i> Driver Login with Mobile OTP</label>

            <div id="stepMobile">
                <div class="input-row">
                    <div class="prefix-box">+91</div>
                    <input type="tel" class="otp-input with-prefix" id="mobileInput" maxlength="10" placeholder="10-digit mobile number" oninput="this.value=this.value.replace(/\D/g,'');onMobileInput()">
                </div>
                <div class="err-msg" id="mobileErr"></div>
                <div id="recaptcha-container"></div>
                <button class="otp-btn mt-2" id="sendBtn" onclick="sendOTP()"><i class="bi bi-send"></i> Send OTP</button>
            </div>

            <div id="stepOtp" style="display:none">
                <p style="color:#5D4037;font-size:0.85rem;margin-bottom:10px">OTP sent to <strong id="sentTo"></strong> &nbsp;<a href="#" onclick="showStep('mobile');return false" style="color:#8D6E63;font-size:0.8rem">Change</a></p>
                <input type="text" class="otp-input mb-2" id="otpInput" maxlength="6" placeholder="Enter 6-digit OTP" oninput="this.value=this.value.replace(/\D/g,'');onOtpInput()">
                <div class="err-msg" id="otpErr"></div>
                <button class="otp-btn mt-2" id="verifyBtn" onclick="verifyOTP(this)"><i class="bi bi-shield-check"></i> Verify OTP</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDTw6bsdW6a0H8xTwztmzJ2dvvwKfxoIeA",
        authDomain: "fleet-app-500019.firebaseapp.com",
        projectId: "fleet-app-500019",
        storageBucket: "fleet-app-500019.firebasestorage.app",
        messagingSenderId: "210811683076",
        appId: "1:210811683076:web:157ac82d575f852f561051",
        measurementId: "G-DSSFQWH5J8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    let confirmationResult = null;

    function setupRecaptcha() {
        if (!window.recaptchaVerifier) {
            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                size: 'invisible',
                callback: () => {}
            });
        }
    }

    function setErr(id, msg) {
        var el = document.getElementById(id);
        el.textContent = msg; el.style.display = msg ? 'block' : 'none';
    }

    function showStep(step) {
        document.getElementById('stepMobile').style.display = step === 'mobile' ? '' : 'none';
        document.getElementById('stepOtp').style.display = step === 'otp' ? '' : 'none';
        if (step === 'mobile') document.getElementById('mobileInput').focus();
    }

    window.showStep = showStep;

    window.onMobileInput = function() {
        var len = document.getElementById('mobileInput').value.length;
        document.getElementById('sendBtn').classList.toggle('ready', len === 10);
    };

    window.onOtpInput = function() {
        var len = document.getElementById('otpInput').value.length;
        document.getElementById('verifyBtn').classList.toggle('ready', len === 6);
    };

    window.sendOTP = async function() {
        var mobile = document.getElementById('mobileInput').value.trim();
        if (mobile.length !== 10) { setErr('mobileErr', 'Enter a valid 10-digit mobile number'); return; }
        setErr('mobileErr', '');
        var btn = document.getElementById('sendBtn');
        btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Sending…';
        try {
            setupRecaptcha();
            confirmationResult = await signInWithPhoneNumber(auth, '+91' + mobile, window.recaptchaVerifier);
            document.getElementById('sentTo').textContent = '+91 ' + mobile;
            showStep('otp');
            document.getElementById('otpInput').focus();
        } catch(e) {
            setErr('mobileErr', e.message || 'Failed to send OTP. Try again.');
            if (window.recaptchaVerifier) { window.recaptchaVerifier.clear(); window.recaptchaVerifier = null; }
        }
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-send"></i> Send OTP';
    };

    window.verifyOTP = async function(btn) {
        var otp = document.getElementById('otpInput').value.trim();
        if (otp.length !== 6) { setErr('otpErr', 'Enter the 6-digit OTP'); return; }
        setErr('otpErr', '');
        btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Verifying…';
        try {
            const result = await confirmationResult.confirm(otp);
            const mobile = result.user.phoneNumber.slice(-10);
            const res = await fetch('/auth/otp/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mobile })
            });
            const data = await res.json();
            if (data.success) { window.location.href = data.redirect || '/driver-portal'; }
            else { setErr('otpErr', data.error || 'Login failed'); }
        } catch(e) {
            setErr('otpErr', e.code === 'auth/invalid-verification-code' ? 'Invalid OTP. Try again.' : (e.message || 'Verification failed'));
        }
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-shield-check"></i> Verify OTP';
    };

    document.getElementById('mobileInput').addEventListener('keydown', e => { if (e.key === 'Enter') window.sendOTP(); });
    document.getElementById('otpInput').addEventListener('keydown', e => { if (e.key === 'Enter') window.verifyOTP(document.getElementById('verifyBtn')); });
</script>
</body>
</html>
