<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vigneshwara Enterprises</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
        body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FFF9C4 0%,#FFFDE7 30%,#FFD54F 70%,#FFC107 100%);overflow:hidden;position:relative}
        body::before{content:'';position:absolute;width:400px;height:400px;background:rgba(255,213,79,0.3);border-radius:50%;top:-100px;right:-100px;animation:float 6s ease-in-out infinite}
        body::after{content:'';position:absolute;width:300px;height:300px;background:rgba(255,249,196,0.4);border-radius:50%;bottom:-50px;left:-50px;animation:float 8s ease-in-out infinite reverse}
        @keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(5deg)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .login-card{background:rgba(255,255,255,0.25);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.4);border-radius:24px;padding:40px 36px;text-align:center;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(255,193,7,0.2);animation:slideUp 0.8s ease-out}
        .login-icon{width:80px;height:80px;background:linear-gradient(135deg,#FFD54F,#FFC107);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:36px;color:#5D4037;box-shadow:0 4px 15px rgba(255,193,7,0.4)}
        h1{font-size:1.8rem;font-weight:700;color:#3E2723;margin-bottom:4px}
        .subtitle{color:#5D4037;font-size:0.9rem;margin-bottom:24px}
        .nav-tabs{border:none;gap:6px;justify-content:center;margin-bottom:24px}
        .nav-tabs .nav-link{border:none;border-radius:50px;padding:8px 22px;font-size:0.88rem;font-weight:600;color:#5D4037;background:rgba(255,255,255,0.3)}
        .nav-tabs .nav-link.active{background:linear-gradient(135deg,#FFD54F,#FFC107);color:#3E2723;box-shadow:0 3px 10px rgba(255,193,7,0.35)}
        .login-btn{display:inline-flex;align-items:center;gap:12px;padding:13px 36px;background:linear-gradient(135deg,#FFD54F,#FFC107);border:none;border-radius:50px;font-size:1rem;font-weight:600;color:#3E2723;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 15px rgba(255,193,7,0.3);text-decoration:none;width:100%;justify-content:center}
        .login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,193,7,0.5);color:#3E2723}
        .login-btn i{font-size:1.2rem}
        .otp-input{background:rgba(255,255,255,0.5);border:1.5px solid rgba(255,193,7,0.4);border-radius:12px;padding:12px 16px;font-size:1rem;width:100%;outline:none;color:#3E2723;font-family:'Poppins',sans-serif;transition:border 0.2s}
        .otp-input:focus{border-color:#FFC107;background:rgba(255,255,255,0.7)}
        .otp-input::placeholder{color:#a0856b}
        .prefix-box{background:rgba(255,193,7,0.2);border:1.5px solid rgba(255,193,7,0.4);border-right:none;border-radius:12px 0 0 12px;padding:12px 14px;font-weight:600;color:#5D4037;font-size:0.95rem}
        .otp-input.with-prefix{border-radius:0 12px 12px 0}
        .err-msg{color:#c0392b;font-size:0.82rem;margin-top:6px;display:none}
        .divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:#8D6E63;font-size:0.8rem}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(93,64,55,0.2)}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-icon"><i class="bi bi-truck"></i></div>
        <h1>Vigneshwara Enterprises</h1>
        <p class="subtitle">Fleet Management System</p>

        <ul class="nav nav-tabs" id="loginTabs">
            <li class="nav-item"><a class="nav-link active" href="#" onclick="showTab('google');return false"><i class="bi bi-google me-1"></i>Google</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="showTab('otp');return false"><i class="bi bi-phone me-1"></i>Mobile OTP</a></li>
        </ul>

        <!-- Google Login -->
        <div id="tabGoogle">
            <a href="/auth/login" class="login-btn"><i class="bi bi-google"></i> Sign in with Google</a>
        </div>

        <!-- Mobile OTP Login -->
        <div id="tabOtp" style="display:none">
            <div id="stepMobile">
                <div class="d-flex mb-3">
                    <div class="prefix-box">+91</div>
                    <input type="tel" class="otp-input with-prefix" id="mobileInput" maxlength="10" placeholder="10-digit mobile number" oninput="this.value=this.value.replace(/\D/g,'')">
                </div>
                <div class="err-msg" id="mobileErr"></div>
                <button class="login-btn mt-1" onclick="sendOTP()"><i class="bi bi-send"></i> Send OTP</button>
            </div>

            <div id="stepOtp" style="display:none">
                <p style="color:#5D4037;font-size:0.85rem;margin-bottom:12px">OTP sent to <strong id="sentTo"></strong></p>
                <input type="text" class="otp-input mb-3" id="otpInput" maxlength="6" placeholder="Enter 6-digit OTP" oninput="this.value=this.value.replace(/\D/g,'')">
                <div class="err-msg" id="otpErr"></div>
                <button class="login-btn mt-1" onclick="verifyOTP()"><i class="bi bi-shield-check"></i> Verify OTP</button>
                <div class="divider">or</div>
                <a href="#" onclick="showStep('mobile');return false" style="color:#5D4037;font-size:0.83rem">← Change number</a>
            </div>
        </div>
    </div>

    <script>
    function showTab(tab){
        document.getElementById('tabGoogle').style.display = tab==='google'?'':'none';
        document.getElementById('tabOtp').style.display = tab==='otp'?'':'none';
        document.querySelectorAll('#loginTabs .nav-link').forEach((el,i)=>{
            el.classList.toggle('active', (tab==='google'&&i===0)||(tab==='otp'&&i===1));
        });
    }
    function showStep(step){
        document.getElementById('stepMobile').style.display = step==='mobile'?'':'none';
        document.getElementById('stepOtp').style.display = step==='otp'?'':'none';
    }
    function setErr(id, msg){ var el=document.getElementById(id); el.textContent=msg; el.style.display=msg?'block':'none'; }

    async function sendOTP(){
        var mobile = document.getElementById('mobileInput').value.trim();
        if(mobile.length !== 10){ setErr('mobileErr','Enter a valid 10-digit mobile number'); return; }
        setErr('mobileErr','');
        var btn = event.target; btn.disabled=true; btn.innerHTML='<i class="bi bi-hourglass-split"></i> Sending…';
        try{
            var r = await fetch('/auth/otp/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mobile})});
            var d = await r.json();
            if(d.success){
                document.getElementById('sentTo').textContent = '+91 ' + mobile;
                showStep('otp');
                document.getElementById('otpInput').focus();
            } else {
                setErr('mobileErr', d.error||'Failed to send OTP');
            }
        } catch(e){ setErr('mobileErr','Network error. Try again.'); }
        btn.disabled=false; btn.innerHTML='<i class="bi bi-send"></i> Send OTP';
    }

    async function verifyOTP(){
        var otp = document.getElementById('otpInput').value.trim();
        if(otp.length !== 6){ setErr('otpErr','Enter the 6-digit OTP'); return; }
        setErr('otpErr','');
        var btn = event.target; btn.disabled=true; btn.innerHTML='<i class="bi bi-hourglass-split"></i> Verifying…';
        try{
            var r = await fetch('/auth/otp/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({otp})});
            var d = await r.json();
            if(d.success){ window.location.href = d.redirect||'/driver-portal'; }
            else { setErr('otpErr', d.error||'Invalid OTP'); }
        } catch(e){ setErr('otpErr','Network error. Try again.'); }
        btn.disabled=false; btn.innerHTML='<i class="bi bi-shield-check"></i> Verify OTP';
    }

    document.getElementById('mobileInput').addEventListener('keydown', e=>{ if(e.key==='Enter') sendOTP(); });
    document.getElementById('otpInput').addEventListener('keydown', e=>{ if(e.key==='Enter') verifyOTP(); });
    </script>
</body>
</html>
